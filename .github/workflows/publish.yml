name: Publish to npm

# Publishes @toma-com/vad to npm when a GitHub Release is published.
# Requires an `NPM_TOKEN` repository secret (an npm "Automation" / granular
# publish token with write access to the @toma-com scope).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - run: bun run typecheck
      - run: bun test

      # setup-node writes ~/.npmrc wired to NODE_AUTH_TOKEN for the publish step.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
